<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Ad Brief — NLC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 40px 16px 60px;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e8e8e8;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
    }
    .field label .opt { font-weight: 400; color: #bbb; }
    .field label .req { color: #e05; }

    .field input[type="text"],
    .field select,
    .field textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input[type="text"]:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #18a0fb;
      background: #fff;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* ── Two-column layout ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Color row ── */
    .color-row { display: flex; gap: 8px; align-items: center; }
    .color-row input[type="color"] {
      width: 40px;
      height: 40px;
      padding: 2px;
      flex-shrink: 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      background: #fafafa;
    }
    .color-row input[type="text"] { flex: 1; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed #d0d0d0;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: #aaa;
      background: #fafafa;
      transition: border-color 0.15s, color 0.15s;
      position: relative;
    }
    .upload-zone:hover { border-color: #18a0fb; color: #18a0fb; }
    .upload-zone.has-file { border-color: #b0d6f7; background: #f0f8ff; color: #1a6ea8; }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 22px; margin-bottom: 6px; }
    .upload-label { font-size: 12px; font-weight: 500; }
    .upload-hint  { font-size: 11px; color: #bbb; margin-top: 3px; }
    .upload-name  { font-size: 12px; font-weight: 600; color: #1a6ea8; margin-top: 4px; word-break: break-all; }
    .upload-preview {
      max-width: 100%;
      max-height: 100px;
      border-radius: 5px;
      margin-top: 10px;
      object-fit: contain;
    }

    /* ── Submit ── */
    .submit-area { margin-top: 8px; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #18a0fb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #0d8ee6; }
    .btn:disabled { background: #a8d4f5; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      line-height: 1.5;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }
    .status.error {
      background: #fdecea;
      color: #c62828;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .status strong { font-weight: 700; }

    .gif-note { font-size: 11px; color: #bbb; margin-top: 5px; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Instagram Ad Brief</h1>
    <p>Fill out the brief, then apply it in Figma via the plugin.</p>
  </div>

  <form id="briefForm">

    <!-- Campaign -->
    <div class="card">
      <div class="card-title">Campaign</div>
      <div class="row">
        <div class="field">
          <label>Campaign Name <span class="req">*</span></label>
          <input type="text" id="campaignName" name="campaignName" placeholder="Summer Sale 2025" required>
        </div>
        <div class="field">
          <label>Brand Name <span class="req">*</span></label>
          <input type="text" id="brandName" name="brandName" placeholder="Acme Co" required>
        </div>
      </div>
    </div>

    <!-- Brand Identity -->
    <div class="card">
      <div class="card-title">Brand Identity</div>

      <div class="row">
        <div class="field">
          <label>Primary Color</label>
          <div class="color-row">
            <input type="color" id="primaryPicker" value="#000000">
            <input type="text"  id="primaryColor"  name="primaryColor" value="#000000" maxlength="7" placeholder="#000000">
          </div>
        </div>
        <div class="field">
          <label>Secondary Color</label>
          <div class="color-row">
            <input type="color" id="secondaryPicker" value="#666666">
            <input type="text"  id="secondaryColor"  name="secondaryColor" value="#666666" maxlength="7" placeholder="#666666">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Font Family</label>
        <select id="fontFamily" name="fontFamily">
          <option value="Inter">Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Open Sans">Open Sans</option>
          <option value="Montserrat">Montserrat</option>
          <option value="Poppins">Poppins</option>
          <option value="Lato">Lato</option>
          <option value="Raleway">Raleway</option>
          <option value="Nunito">Nunito</option>
          <option value="DM Sans">DM Sans</option>
          <option value="Work Sans">Work Sans</option>
          <option value="Plus Jakarta Sans">Plus Jakarta Sans</option>
          <option value="Archivo">Archivo</option>
          <option value="Playfair Display">Playfair Display</option>
          <option value="Merriweather">Merriweather</option>
          <option value="Georgia">Georgia</option>
        </select>
      </div>
    </div>

    <!-- Content -->
    <div class="card">
      <div class="card-title">Content</div>

      <div class="field">
        <label>Headline</label>
        <input type="text" id="headline" name="headline" placeholder="Your compelling headline">
      </div>

      <div class="field">
        <label>Body Copy <span class="opt">(optional)</span></label>
        <textarea id="bodyText" name="bodyText" placeholder="Supporting copy…"></textarea>
      </div>

      <div class="field">
        <label>CTA Text</label>
        <input type="text" id="ctaText" name="ctaText" placeholder="Shop Now">
      </div>
    </div>

    <!-- Assets -->
    <div class="card">
      <div class="card-title">Assets</div>

      <div class="field">
        <label>Background Image</label>
        <div class="upload-zone" id="bgZone">
          <input type="file" id="backgroundFile" name="backgroundFile" accept="image/png,image/jpeg,image/gif,image/webp">
          <div class="upload-icon">🖼</div>
          <div class="upload-label">Click to upload background</div>
          <div class="upload-hint">PNG, JPG, GIF — fills the full artboard</div>
          <div class="upload-name" id="bgName" style="display:none"></div>
          <img id="bgPreview" class="upload-preview" style="display:none" alt="">
        </div>
        <div class="gif-note">GIF imports as static in Figma (first frame only)</div>
      </div>

      <div class="field">
        <label>Logo</label>
        <div class="upload-zone" id="logoZone">
          <input type="file" id="logoFile" name="logoFile" accept="image/png,image/jpeg">
          <div class="upload-icon">✦</div>
          <div class="upload-label">Click to upload logo</div>
          <div class="upload-hint">PNG or JPG</div>
          <div class="upload-name" id="logoName" style="display:none"></div>
          <img id="logoPreview" class="upload-preview" style="display:none" alt="">
        </div>
      </div>
    </div>

    <div class="submit-area">
      <button type="submit" class="btn" id="submitBtn">Send Brief to Figma</button>
      <div class="status" id="status"></div>
    </div>

  </form>

</div>

<script>
  // ── Color sync ────────────────────────────────────────────────────────────

  function bindColor(pickerId, hexId) {
    const picker = document.getElementById(pickerId);
    const hex    = document.getElementById(hexId);
    picker.addEventListener('input', () => { hex.value = picker.value; });
    hex.addEventListener('input', () => {
      if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) picker.value = hex.value;
    });
  }
  bindColor('primaryPicker',   'primaryColor');
  bindColor('secondaryPicker', 'secondaryColor');

  // ── Upload zones ──────────────────────────────────────────────────────────

  function setupUpload(inputId, zoneId, nameId, previewId) {
    const input   = document.getElementById(inputId);
    const zone    = document.getElementById(zoneId);
    const nameEl  = document.getElementById(nameId);
    const preview = document.getElementById(previewId);

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      zone.classList.add('has-file');
      nameEl.textContent = file.name;
      nameEl.style.display = 'block';
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    });
  }

  setupUpload('backgroundFile', 'bgZone',   'bgName',   'bgPreview');
  setupUpload('logoFile',       'logoZone', 'logoName', 'logoPreview');

  // ── Status ────────────────────────────────────────────────────────────────

  function showStatus(type, html) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = html;
  }

  // ── Submit ────────────────────────────────────────────────────────────────

  document.getElementById('briefForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const formData = new FormData(e.target);

    try {
      const res = await fetch('/api/brief', { method: 'POST', body: formData });
      const json = await res.json();

      if (json.success) {
        showStatus('success',
          '<strong>Brief sent!</strong> Open the Figma plugin and click ' +
          '<em>"Load from web form"</em> to apply it to your design.'
        );
        btn.textContent = 'Send Brief to Figma';
        btn.disabled = false;
      } else {
        throw new Error('Server returned an error.');
      }
    } catch (err) {
      showStatus('error', '<strong>Error:</strong> ' + err.message +
        ' — make sure the server is running (<code>npm start</code>).');
      btn.textContent = 'Send Brief to Figma';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
